# .ruff.toml

# Exclude common directories
exclude = [
    ".git",
    ".mypy_cache",
    ".pytest_cache",
    ".ruff_cache",
    ".venv",
    "venv",
]

line-length = 120

[lint]
# Enable Pyflakes (F) and pycodestyle (E, W) codes by default
select = ["E", "F", "W"]

# Ignore legacy formatting/style rules to ensure clean CI execution
ignore = [
    "E722",  # Do not use bare except
    "E701",  # Multiple statements on one line (colon)
    "E712",  # Avoid equality comparisons to True/False
    "F841",  # Local variable is assigned to but never used
    "E501",  # Line too long
]
